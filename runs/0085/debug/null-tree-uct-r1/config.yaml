    context_window_tokens: 16384
  seed: 43
database:
  archive_size: 25
  artifact_retention_days: 30
  artifact_size_threshold: 32768
  artifacts_base_path: null
  cleanup_old_artifacts: true
  db_path: runs/0085/null-tree-uct-r1/db
  diversity_metric: edit_distance
