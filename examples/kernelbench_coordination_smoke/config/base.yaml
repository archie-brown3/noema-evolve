# KernelBench L1/88 (MiniGPT GELU) coordination smoke pilot — invariant base.
#
# Task 0104 / spec/KERNELBENCH-P88-PILOT.md §4, §11. Load with
# NoemaConfig.from_yaml() after merging an arm overlay via config_loader.py.
# This file is CONFIG ONLY — no run starts from it directly, and no GPU/docker
# execution happens in this repo slice (task 0112). Real launches are
# user-triggered per spec/LIVE-RUNS.md, gated on the sandboxed worker (0104).
#
# Arm identity lives ONLY in coordination.module (config/arms/*.yaml) —
# config_loader.py refuses any other delta between arms.

max_iterations: 1000  # non-binding; the 50,000-token budget is what stops a run
checkpoint_interval: 25
random_seed: 42

diff_based_evolution: true
max_code_length: 80000  # generated inline CUDA commonly exceeds the 10,000 default

num_inspirations: 2
num_top_programs: 3
num_previous_programs: 3

# Substrate-level, invariant across arms (spec §4, §2.7).
retry_enabled: true
retry_cap: 2
retry_on: non_improvement

# EoH five-operator menu, all arms (spec §2.5). Bandit routes adaptively over
# the same menu; null/hifo/pes-faithful draw from it with the same seed.
mutation_operators: [e1, e2, m1, m2, m3]
mutation_operator_seed: 44

budget:
  total_tokens: 50000

llm:
  model: gpt-4o-mini  # placeholder — the user pins the real model before launch
  temperature: 0.7
  top_p: 0.95
  max_tokens: 4096
  timeout: 300

coordination:
  seed: 43
  # module: set by the arm overlay ONLY (config/arms/*.yaml)

selection:
  seed: 45

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  # feature_dimensions defaults to [complexity, diversity] (spec §4) — unset

evaluator:
  timeout: 120  # must exceed the (future, out-of-scope) worker deadline
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false
  enable_artifacts: true

prompt:
  use_template_stochasticity: false
  system_message: |
    Optimize a custom CUDA kernel for KernelBench Level 1 problem 88
    (MiniGPT GELU: 0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715 * x^3)))).

    Fitness is direct speedup over the PyTorch reference; 1.0 is parity.
    Preserve the ModelNew.forward(x) interface exactly. FP32 only. A real
    custom CUDA implementation is required — no PyTorch compute fallback.
    Only the code inside the evolve block may change. Follow the output
    format required by the mutation operator you were given.
