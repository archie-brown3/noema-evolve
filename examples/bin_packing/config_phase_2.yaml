# Configuration for breaking through bin packing plateaus
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

# LLM configuration
llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

# Prompt configuration
prompt:
  # NOTE: legacy openevolve-native config, not loaded by noema (see config_phase_1).
  system_message: |
    You are an expert in ONLINE bin packing heuristics. Items arrive one at a time
    into bins of capacity 100 and are placed immediately — you cannot reorder them
    or look ahead, so offline/batch/branch-and-bound ideas do not apply. Improve
    only the `priority(item, bins)` heuristic that scores the bins able to hold the
    arriving item; the item goes to the highest-scoring one. The best-fit baseline
    leaves a real gap — subtle non-linear functions of item size and remaining
    capacity are the way to close it. Score = 1 / (1 + mean excess over the lower
    bound). Only the `priority` function (inside the EVOLVE-BLOCK) may change.
  num_top_programs: 4
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 70
  archive_size: 30
  num_islands: 5
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.6

# Evaluator configuration
evaluator:
  timeout: 90
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.8]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 100000