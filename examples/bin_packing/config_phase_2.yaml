# Configuration for breaking through bin packing plateaus
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

# LLM configuration
llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are an expert in bin packing algorithms and optimization. We're trying to achieve near-optimal bin packing for 100 items with a mixture distribution. The current implementation uses First-Fit Decreasing, but we need to explore more advanced techniques to break through plateaus.

    Advanced insights to explore:
    1. Multi-phase algorithms: sort items by size category, pack each category optimally
    2. Exact algorithms: branch-and-bound for small subsets, heuristics for rest
    3. Metaheuristics: simulated annealing, genetic algorithms, tabu search
    4. Machine learning approaches: predict optimal bin for each item
    5. Hybrid online/offline: process in batches, optimize within each batch
    6. Look-ahead algorithms: consider future items when making decisions
    7. Specialized heuristics for mixture distributions
    
    Focus on fundamentally different approaches - consider exact methods for large items, heuristics for small items, or combining multiple algorithms.
  num_top_programs: 4
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 70
  archive_size: 30
  num_islands: 5
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.6

# Evaluator configuration
evaluator:
  timeout: 90
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.8]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
max_code_length: 100000