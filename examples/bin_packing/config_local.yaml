# Local testing configuration for bin packing benchmark
max_iterations: 5
checkpoint_interval: 1
log_level: "DEBUG"

# LLM configuration - local model for testing
llm:
  primary_model: "llama3.1-8b"
  primary_model_weight: 1.0
  api_base: "http://localhost:8080/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2048
  timeout: 30

# Prompt configuration
prompt:
  system_message: |
    You are an expert in bin packing algorithms. Improve the bin packing function to minimize bins used for 100 items.
  num_top_programs: 2
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 10
  archive_size: 5
  num_islands: 1
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 30
  cascade_evaluation: false
  parallel_evaluations: 2
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true