# Configuration for bin packing benchmark evolution
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

# LLM configuration
llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    You are an expert in bin packing algorithms and optimization. Your task is to improve a bin packing function that packs 100 items with sizes following a mixture distribution (60% small [0-0.3], 30% medium [0.3-0.7], 10% large [0.7-1.0]) into bins of capacity 1.0, minimizing the number of bins used.

    Key algorithmic insights:
    - The optimal solution lower bound is ceil(sum(items)/1.0)
    - First-Fit Decreasing is a strong baseline (2/3 optimal guarantee)
    - For mixture distributions, hybrid approaches often work best
    - Online algorithms consider items in arrival order
    - Offline algorithms can sort items first for better packing
    - Well-known heuristics: First-Fit, Best-Fit, Worst-Fit, Next-Fit
    - Advanced: Harmonic algorithms, Sum-of-Squares, refined first-fit
    
    Focus on improving the pack_items() function while maintaining the I/O contract.
    The goal is to achieve as close to optimal as possible (score = 1/(1+optimality_gap)).
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true