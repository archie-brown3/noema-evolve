# Configuration for bin packing benchmark evolution
max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

# LLM configuration
llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

# Prompt configuration
prompt:
  # NOTE: this legacy openevolve-native config is not loaded by noema's
  # run_noema_arm.py (which builds NoemaConfig inline); its SYSTEM_MESSAGE there
  # is authoritative. Kept in sync for anyone using the openevolve path directly.
  system_message: |
    You are an expert in ONLINE bin packing heuristics. Integer-sized items arrive
    one at a time into bins of capacity 100 and must be placed immediately — no
    reordering, no lookahead. Improve only the `priority(item, bins)` heuristic:
    given the arriving item and the remaining capacities of the bins that can hold
    it, return a score per bin; the item goes to the highest-scoring bin. The
    baseline is best-fit (`-(bins - item)`); a better non-linear heuristic packs
    into fewer bins. Score = 1 / (1 + mean excess over the lower bound). Only the
    `priority` function (inside the EVOLVE-BLOCK) may change.
  num_top_programs: 3
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true